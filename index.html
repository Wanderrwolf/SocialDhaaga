<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Dhaaga</title>

  <meta name="description" content="Social Dhaaga connects culture, distribution, influence, music, and brands inside one premium ecosystem.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body class="page page-home">

  <div class="page-noise"></div>

  <main class="hero-shell">

    <section class="hero hero-home fade-up">

      <div class="hero-home__stage">

        <div class="hero-mark ambient-float" aria-hidden="true">
          <div class="hero-mark__disc">
            <div class="hero-mark__surface"></div>
            <div class="hero-mark__shine"></div>
            <div class="hero-mark__label-core"></div>

            <img class="hero-logo" src="assets/logo-mark.png" alt="">
          </div>
        </div>

        <div class="hero-copy">

          <p class="eyebrow">MUSIC / CULTURE / INFLUENCE</p>

          <h1 class="hero-brand">Social Dhaaga</h1>

          <p class="tagline">
            Built For What Deserves Attention.
          </p>

          <div class="hero-words">

            <span class="hero-words__static">
              Built For
            </span>

            <div class="hero-words__viewport">

              <span class="hero-words__word">Artists.</span>
              <span class="hero-words__word">Brands.</span>
              <span class="hero-words__word">Labels.</span>
              <span class="hero-words__word">Music.</span>
              <span class="hero-words__word">Distribution.</span>
              <span class="hero-words__word">Culture.</span>
              <span class="hero-words__word">Amplification.</span>

            </div>

          </div>

          <div class="hero-cta-wrap">

            <div class="hero-actions">
              <a class="button button-primary" href="music.html">Media</a>
              <a class="button button-secondary" href="studio.html">Studio</a>
            </div>

            <p class="hero-note">
              Two sides of the same ecosystem.
            </p>

          </div>

        </div>

      </div>

    </section>

  </main>

</body>
</html>
